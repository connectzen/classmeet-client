<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" ry="96" fill="#1e1b4b"/>
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Graduation cap top (mortarboard) -->
  <!-- Board (diamond shape) -->
  <polygon points="256,100 420,185 256,270 92,185" fill="#818cf8"/>
  <!-- Crown of cap -->
  <polygon points="256,100 420,185 256,270 92,185" fill="#6366f1"/>
  <!-- Highlight on cap top -->
  <polygon points="256,100 420,185 338,227 256,163" fill="#a5b4fc" opacity="0.4"/>

  <!-- Tassel string -->
  <line x1="420" y1="185" x2="420" y2="280" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="420" cy="290" r="12" fill="#fbbf24"/>

  <!-- Body / hanging part of cap (graduation gown implied) -->
  <path d="M160 210 L160 330 Q160 360 192 360 L256 370 L320 360 Q352 360 352 330 L352 210" fill="#4f46e5"/>

  <!-- Diploma / paper scroll in gown area -->
  <rect x="214" y="245" width="84" height="60" rx="6" fill="#e0e7ff" opacity="0.9"/>
  <line x1="228" y1="262" x2="298" y2="262" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <line x1="228" y1="275" x2="298" y2="275" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <line x1="228" y1="288" x2="270" y2="288" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>

  <!-- Video camera icon bottom-right (ClassMeet = video class) -->
  <rect x="80" y="350" width="160" height="100" rx="16" fill="#312e81"/>
  <polygon points="240,360 300,390 240,420" fill="#818cf8"/>
  <circle cx="130" cy="380" r="14" fill="#6366f1"/>
  <circle cx="130" cy="380" r="8" fill="#a5b4fc"/>
</svg>
